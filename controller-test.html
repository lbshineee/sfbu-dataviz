<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

<a-scene>

  <a-sky color="#88c"></a-sky>

  <a-camera position="0 1.6 0"></a-camera>

  <a-entity
      laser-controls="hand: left"
      raycaster="showLine: true">
  </a-entity>

  <a-entity
      laser-controls="hand: right"
      raycaster="showLine: true">
  </a-entity>

  <a-box
      position="0 1 -3"
      color="red">
  </a-box>

</a-scene>

</body>
</html>
