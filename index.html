```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SFBU VR Data Visualization</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script>
AFRAME.registerComponent('csv-bars', {
  init: async function () {

    const response = await fetch('./data/courses.csv');
    const text = await response.text();

    const rows = text.trim().split('\n');
    const headers = rows[0].split(',');

    const chart = this.el;

    rows.slice(1).forEach((row, i) => {

      const cols = row.split(',');

      const course = cols[0];
      const value = parseFloat(cols[1]);

      const h = value / 20;

      const bar = document.createElement('a-box');

      bar.setAttribute('position', `${i * 2} ${h/2} 0`);
      bar.setAttribute('height', h);
      bar.setAttribute('width', 1);
      bar.setAttribute('depth', 1);

      bar.setAttribute('color',
        `hsl(${i*35},70%,60%)`);

      chart.appendChild(bar);

      const label = document.createElement('a-text');

      label.setAttribute('value', course);
      label.setAttribute('align', 'center');
      label.setAttribute('color', 'black');

      label.setAttribute(
        'position',
        `${i*2} -0.5 0`
      );

      chart.appendChild(label);

      const valueLabel =
        document.createElement('a-text');

      valueLabel.setAttribute(
        'value',
        value
      );

      valueLabel.setAttribute(
        'align',
        'center'
      );

      valueLabel.setAttribute(
        'color',
        'black'
      );

      valueLabel.setAttribute(
        'position',
        `${i*2} ${h+0.5} 0`
      );

      chart.appendChild(valueLabel);
    });
  }
});
</script>

</head>

<body>

<a-scene>

  <a-sky color="#ECECEC"></a-sky>

  <a-plane
      rotation="-90 0 0"
      width="100"
      height="100"
      color="#DDDDDD">
  </a-plane>

  <a-entity
      position="0 1.6 8">
      <a-camera></a-camera>
  </a-entity>

  <!-- Entire chart -->
  <a-entity
      id="chart"
      csv-bars
      position="-6 0 -8"
      scale="1 1 1">
  </a-entity>

</a-scene>

</body>
</html>
```
