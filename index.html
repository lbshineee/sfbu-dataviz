<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SFBU VR DataViz</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-look-at-component@latest/dist/aframe-look-at-component.min.js"></script>

<script>
AFRAME.registerComponent('csv-bars', {
  async init() {

    const response = await fetch('./data/courses.csv');
    const text = await response.text();

    const rows = text.trim().split('\n');

    rows.slice(1).forEach((row, i) => {

      const cols = row.split(',');

      const course = cols[0];
      const value = parseFloat(cols[1]);

      const height = value / 20;

      const bar = document.createElement('a-box');

      bar.setAttribute(
        'position',
        `${i * 2} ${height / 2} 0`
      );

      bar.setAttribute('height', height);
      bar.setAttribute('width', 1);
      bar.setAttribute('depth', 1);

      bar.setAttribute(
        'color',
        `hsl(${i * 35},70%,60%)`
      );

      this.el.appendChild(bar);

      const courseLabel =
        document.createElement('a-text');

      courseLabel.setAttribute(
        'value',
        course
      );

      courseLabel.setAttribute(
        'position',
        `${i * 2} 0.4 0.8`
      );

      courseLabel.setAttribute(
        'scale',
        '1.5 1.5 1.5'
      );

      courseLabel.setAttribute(
        'look-at',
        '#camera'
      );

      courseLabel.setAttribute(
        'align',
        'center'
      );

      courseLabel.setAttribute(
        'color',
        '#111'
      );

      this.el.appendChild(courseLabel);

      const valueLabel =
        document.createElement('a-text');

      valueLabel.setAttribute(
        'value',
        value
      );

      valueLabel.setAttribute(
        'position',
        `${i * 2} ${height + 0.5} 0`
      );

      valueLabel.setAttribute(
        'look-at',
        '#camera'
      );

      valueLabel.setAttribute(
        'scale',
        '2 2 2'
      );

      valueLabel.setAttribute(
        'align',
        'center'
      );

      valueLabel.setAttribute(
        'color',
        '#111'
      );

      this.el.appendChild(valueLabel);
    });
  }
});

AFRAME.registerComponent('chart-controller', {

  init() {

    const chart =
      document.querySelector('#chart');

    const rightHand =
      document.querySelector('#rightHand');

    let grabbing = false;

    rightHand.addEventListener(
      'triggerdown',
      () => grabbing = true
    );

    rightHand.addEventListener(
      'triggerup',
      () => grabbing = false
    );

    this.tick = () => {

      if (!grabbing) return;

      const p =
        rightHand.object3D.position;

      chart.object3D.position.set(
        p.x,
        p.y,
        p.z - 2
      );
    };

    rightHand.addEventListener(
      'abuttondown',
      () => {

        chart.object3D.scale.multiplyScalar(
          1.2
        );
      }
    );

    rightHand.addEventListener(
      'bbuttondown',
      () => {

        chart.object3D.scale.multiplyScalar(
          0.8
        );
      }
    );
  }
});
</script>

</head>

<body>

<a-scene chart-controller>

  <a-sky color="#ECECEC"></a-sky>

  <a-plane
    rotation="-90 0 0"
    width="100"
    height="100"
    color="#DDDDDD">
  </a-plane>

  <a-light
    type="ambient"
    intensity="1">
  </a-light>

  <a-light
    type="directional"
    intensity="0.8"
    position="2 4 3">
  </a-light>

  <a-entity position="0 1.6 8">
    <a-camera id="camera"></a-camera>
  </a-entity>

  <a-entity
    id="leftHand"
    laser-controls="hand: left">
  </a-entity>

  <a-entity
    id="rightHand"
    laser-controls="hand: right">
  </a-entity>

  <a-entity
    id="chart"
    csv-bars
    position="-6 0 -8">
  </a-entity>

</a-scene>

</body>
</html>
